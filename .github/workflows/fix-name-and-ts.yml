name: Fix App Name and TypeScript Errors

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: deploy src-tauri/tauri.conf.json
        run: |
          mkdir -p src-tauri
          echo '' | base64 --decode > src-tauri/tauri.conf.json

      - name: deploy src-tauri/Cargo.toml
        run: |
          mkdir -p src-tauri
          echo '' | base64 --decode > src-tauri/Cargo.toml

      - name: deploy src/App.tsx
        run: |
          mkdir -p src
          echo '' | base64 --decode > src/App.tsx

      - name: deploy src/components/Settings.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/Settings.tsx

      - name: deploy src/components/Sidebar.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/Sidebar.tsx

      - name: deploy src/components/ReaderWindow.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/ReaderWindow.tsx

      - name: deploy src/components/ComicCard.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/ComicCard.tsx

      - name: deploy src/components/CoverStack.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/CoverStack.tsx

      - name: deploy src/components/FolderCard.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/FolderCard.tsx

      - name: deploy src/components/FolderGroup.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/FolderGroup.tsx

      - name: deploy src/components/ComicDetail.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/ComicDetail.tsx

      - name: verify
        run: |
          grep -q "Lector TBO" src-tauri/tauri.conf.json         || (echo "FAIL: name in tauri.conf.json" && exit 1)
          grep -q "Lector TBO" src-tauri/Cargo.toml              || (echo "FAIL: name in Cargo.toml" && exit 1)
          grep -q "LECTOR TBO" src/components/Sidebar.tsx        || (echo "FAIL: name in Sidebar" && exit 1)
          ! grep -q "import React," src/components/FolderCard.tsx || (echo "FAIL: unused React in FolderCard" && exit 1)
          ! grep -q "import React," src/components/CoverStack.tsx || (echo "FAIL: unused React in CoverStack" && exit 1)
          ! grep -q "import React," src/components/ComicCard.tsx  || (echo "FAIL: unused React in ComicCard" && exit 1)
          ! grep -q "toggleRead" src/components/ComicDetail.tsx   || (echo "FAIL: toggleRead in ComicDetail" && exit 1)
          echo "All checks passed"

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: rename to Lector TBO + remove unused React imports + unused vars"
          git push
