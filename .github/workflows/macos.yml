name: Build macOS

on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'package.json'
      - '.github/workflows/macos.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        architecture: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}
      - name: install frontend dependencies
        run: npm install
      - name: build tauri desktop
        run: npm run tauri build -- --target ${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}
        env:
          APPLE_SIGNING_IDENTITY: "-"
      - uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-macOS-${{ matrix.architecture }}
          path: src-tauri/target/${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}/release/bundle/dmg/*.dmg
