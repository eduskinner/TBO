name: Build Android

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: install android ndk
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
      - name: set ndk environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
      - name: install frontend dependencies
        run: npm install
      - name: initialize android project
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init --ci
          fi

      - name: build android apk
        run: npm run tauri android build -- --apk --target aarch64 --debug
      - uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-Android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
