name: Fix tauri.conf.json

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: write tauri.conf.json v2
        run: echo '' | base64 --decode > src-tauri/tauri.conf.json

      - name: verify
        run: |
          python3 -c "
import json, sys
c = json.load(open('src-tauri/tauri.conf.json'))
assert c['productName'] == 'Lector TBO', 'wrong name'
assert 'identifier' in c, 'missing identifier'
assert 'devUrl' in c['build'], 'missing devUrl - v1 format'
assert 'frontendDist' in c['build'], 'missing frontendDist - v1 format'
assert 'package' not in c, 'v1 package key present'
assert 'tauri' not in c, 'v1 tauri key present'
print('tauri.conf.json OK')
"

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git diff --cached --quiet && echo "nothing to commit" || git commit -m "fix: tauri.conf.json v2 format with correct Lector TBO name"
          git push
