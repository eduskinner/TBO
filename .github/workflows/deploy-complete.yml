name: Deploy Complete Source

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: src/App.tsx
        run: |
          mkdir -p src
          echo '' | base64 --decode > src/App.tsx

      - name: src/main.tsx
        run: |
          mkdir -p src
          echo '' | base64 --decode > src/main.tsx

      - name: src/components/ComicCard.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/ComicCard.tsx

      - name: src/components/ComicDetail.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/ComicDetail.tsx

      - name: src/components/CoverStack.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/CoverStack.tsx

      - name: src/components/FolderCard.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/FolderCard.tsx

      - name: src/components/FolderGroup.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/FolderGroup.tsx

      - name: src/components/Library.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/Library.tsx

      - name: src/components/Reader.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/Reader.tsx

      - name: src/components/ReaderWindow.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/ReaderWindow.tsx

      - name: src/components/Settings.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/Settings.tsx

      - name: src/components/Sidebar.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/Sidebar.tsx

      - name: src/mobile/MobileApp.tsx
        run: |
          mkdir -p src/mobile
          echo '' | base64 --decode > src/mobile/MobileApp.tsx

      - name: src/store/coverQueue.ts
        run: |
          mkdir -p src/store
          echo '' | base64 --decode > src/store/coverQueue.ts

      - name: src/store/index.ts
        run: |
          mkdir -p src/store
          echo '' | base64 --decode > src/store/index.ts

      - name: src/store/pageQueue.ts
        run: |
          mkdir -p src/store
          echo '' | base64 --decode > src/store/pageQueue.ts

      - name: src/store/panelDetector.ts
        run: |
          mkdir -p src/store
          echo '' | base64 --decode > src/store/panelDetector.ts

      - name: src/types/index.ts
        run: |
          mkdir -p src/types
          echo '' | base64 --decode > src/types/index.ts

      - name: src-tauri/src/lib.rs
        run: |
          mkdir -p src-tauri/src
          echo '' | base64 --decode > src-tauri/src/lib.rs

      - name: src-tauri/Cargo.toml
        run: |
          mkdir -p src-tauri
          echo '' | base64 --decode > src-tauri/Cargo.toml

      - name: src-tauri/tauri.conf.json
        run: |
          mkdir -p src-tauri
          echo '' | base64 --decode > src-tauri/tauri.conf.json

      - name: remove stale files
        run: rm -f src/tauri-shims.d.ts src/MobileApp.tsx

      - name: verify
        run: |
          grep -q "Lector TBO" src-tauri/tauri.conf.json || (echo "FAIL name" && exit 1)
          grep -q "devUrl" src-tauri/tauri.conf.json || (echo "FAIL devUrl" && exit 1)
          grep -q "frontendDist" src-tauri/tauri.conf.json || (echo "FAIL frontendDist" && exit 1)
          ! grep -q '"package"' src-tauri/tauri.conf.json || (echo "FAIL v1 package key" && exit 1)
          ! grep -q '"tauri"' src-tauri/tauri.conf.json || (echo "FAIL v1 tauri key" && exit 1)
          grep -q "index.html#reader" src-tauri/src/lib.rs || (echo "FAIL reader hash" && exit 1)
          grep -q "LECTOR TBO" src/components/Sidebar.tsx || (echo "FAIL sidebar name" && exit 1)
          ! grep -rq "@tauri-apps/api/tauri" src/ || (echo "FAIL old tauri import" && exit 1)
          ! grep -q "filteredComics" src/components/Library.tsx || (echo "FAIL filteredComics" && exit 1)
          echo "All checks passed" 

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "deploy: complete verified source - Lector TBO"
          git push
