name: Fix Android Crash - Add Capabilities

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create src-tauri/capabilities/default.json
        run: |
          mkdir -p src-tauri/capabilities
          echo '' | base64 --decode > src-tauri/capabilities/default.json

      - name: verify
        run: |
          cat src-tauri/capabilities/default.json
          python3 -c "import json; c=json.load(open('src-tauri/capabilities/default.json')); assert 'core:default' in c['permissions'], 'FAIL'"
          echo "Capabilities file OK"

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/capabilities/default.json
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "fix: add capabilities/default.json — required by Tauri v2 for Android IPC"
          git push
