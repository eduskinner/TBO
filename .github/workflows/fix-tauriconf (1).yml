name: Fix tauri.conf.json

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: write tauri.conf.json v2
        run: echo '' | base64 --decode > src-tauri/tauri.conf.json
      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git diff --cached --quiet || git commit -m "fix: tauri.conf.json v2 format"
          git push
