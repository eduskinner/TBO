name: Apply All Fixes

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: restore tsconfig.json
        run: echo '' | base64 --decode > tsconfig.json

      - name: write src/tauri-shims.d.ts
        run: |
          mkdir -p "$(dirname 'src/tauri-shims.d.ts')"
          echo '' | base64 --decode > "src/tauri-shims.d.ts"

      - name: write src/App.tsx
        run: |
          mkdir -p "$(dirname 'src/App.tsx')"
          echo '' | base64 --decode > "src/App.tsx"

      - name: write src/mobile/MobileApp.tsx
        run: |
          mkdir -p "$(dirname 'src/mobile/MobileApp.tsx')"
          echo '' | base64 --decode > "src/mobile/MobileApp.tsx"

      - name: write src/mobile/usePlatform.ts
        run: |
          mkdir -p "$(dirname 'src/mobile/usePlatform.ts')"
          echo '' | base64 --decode > "src/mobile/usePlatform.ts"

      - name: write src/index.css
        run: |
          mkdir -p "$(dirname 'src/index.css')"
          echo '' | base64 --decode > "src/index.css"

      - name: write src-tauri/src/lib.rs
        run: |
          mkdir -p "$(dirname 'src-tauri/src/lib.rs')"
          echo '' | base64 --decode > "src-tauri/src/lib.rs"

      - name: write src-tauri/Cargo.toml
        run: |
          mkdir -p "$(dirname 'src-tauri/Cargo.toml')"
          echo '' | base64 --decode > "src-tauri/Cargo.toml"

      - name: remove stray files
        run: rm -f src/MobileApp.tsx

      - name: commit all changes
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet || git commit -m 'fix: TS shims + CBR ZIP-fallback + PDF support'
          git push
