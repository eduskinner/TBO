name: Apply All Fixes

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: write tauri-shims.d.ts
        run: echo '' | base64 --decode > src/tauri-shims.d.ts

      - name: rewrite all tauri-apps subpath imports to root
        run: |
          find src -name "*.ts" -o -name "*.tsx" | xargs sed -i \
            -e 's|from "@tauri-apps/api/tauri"|from "@tauri-apps/api"|g' \
            -e "s|from '@tauri-apps/api/tauri'|from '@tauri-apps/api'|g" \
            -e 's|from "@tauri-apps/api/event"|from "@tauri-apps/api"|g' \
            -e "s|from '@tauri-apps/api/event'|from '@tauri-apps/api'|g" \
            -e 's|from "@tauri-apps/api/dialog"|from "@tauri-apps/api"|g' \
            -e "s|from '@tauri-apps/api/dialog'|from '@tauri-apps/api'|g" \
            -e 's|from "@tauri-apps/api/core"|from "@tauri-apps/api"|g' \
            -e "s|from '@tauri-apps/api/core'|from '@tauri-apps/api'|g"

      - name: verify no subpath imports remain
        run: |
          COUNT=$(grep -r '@tauri-apps/api/' src --include="*.ts" --include="*.tsx" | wc -l)
          echo "Remaining subpath imports: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            grep -r '@tauri-apps/api/' src --include="*.ts" --include="*.tsx"
            exit 1
          fi

      - name: remove stray files
        run: rm -f src/MobileApp.tsx

      - name: delete all workflows except build.yml and this one
        run: |
          cd .github/workflows
          for f in *.yml; do
            if [ "$f" != "build.yml" ] && [ "$f" != "apply-all-fixes.yml" ]; then
              echo "Deleting $f"
              rm -f "$f"
            fi
          done

      - name: commit
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet || git commit -m 'fix: all tauri subpath imports to root + purge stale workflows'
          git push
