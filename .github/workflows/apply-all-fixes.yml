name: Apply All Fixes

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: write fixed lib.rs
        run: |
          mkdir -p src-tauri/src
          echo '' | base64 --decode > src-tauri/src/lib.rs
          grep -n "let rows: Vec" src-tauri/src/lib.rs && echo "borrow fix present" || (echo "MISSING FIX" && exit 1)

      - name: upgrade tauri JS packages to v2
        run: echo '' | base64 --decode | node

      - name: fix tauri imports to v2 paths
        run: echo '' | base64 --decode | python3

      - name: restore tsconfig.json
        run: echo '' | base64 --decode > tsconfig.json

      - name: remove stray files
        run: rm -f src/MobileApp.tsx src/tauri-shims.d.ts

      - name: delete stale workflows
        run: |
          cd .github/workflows
          for f in *.yml; do
            [ "$f" != "build.yml" ] && [ "$f" != "apply-all-fixes.yml" ] && echo "Deleting $f" && rm -f "$f"
          done

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: Rust borrow error + Tauri v2 JS + correct imports"
          git push
