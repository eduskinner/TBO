name: Fix Capabilities - Correct Permissions

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write src-tauri/capabilities/default.json
        run: |
          mkdir -p src-tauri/capabilities
          echo '' | base64 --decode > src-tauri/capabilities/default.json
          cat src-tauri/capabilities/default.json

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/capabilities/default.json
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "fix: capabilities - core:default only, no nonexistent fs permissions"
          git push
