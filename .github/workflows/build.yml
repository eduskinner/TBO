name: "Build and Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        architecture: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}

      - name: install frontend dependencies
        run: npm install

      - name: build tauri desktop
        run: npm run tauri build -- --target ${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}

      - name: upload macos dmg
        uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-macOS-${{ matrix.architecture }}
          path: src-tauri/target/${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}/release/bundle/dmg/*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      - name: install frontend dependencies
        run: npm install

      - name: initialize android (if missing)
        # We need the android metadata in the repo, but since we can't run it locally,
        # we try to run it here. However, 'init' usually needs manual input for name/id.
        # We'll use the --yes or equivalent if I can find it, or just hope 'build' handles it.
        # Actually, let's try to run init with the -y flag if available.
        run: npx tauri android init --yes || true

      - name: build tauri android
        # We use --debug for now to avoid signing issues.
        run: npm run tauri android build -- --debug

      - name: upload android apk
        uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-Android
          path: src-tauri/gen/android/app/build/outputs/apk/debug/*.apk

  create-release:
    needs: [build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download macos aarch64
        uses: actions/download-artifact@v4
        with:
          name: Lector-TBO-macOS-aarch64
          path: release-artifacts

      - name: download macos x86_64
        uses: actions/download-artifact@v4
        with:
          name: Lector-TBO-macOS-x86_64
          path: release-artifacts

      - name: download android apk
        uses: actions/download-artifact@v4
        with:
          name: Lector-TBO-Android
          path: release-artifacts

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Lector TBO - Latest Build"
          body: |
            Automated build of Lector TBO.
            - **macOS (Apple Silicon)**: aarch64.dmg
            - **macOS (Intel)**: x86_64.dmg
            - **Android**: debug.apk
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
