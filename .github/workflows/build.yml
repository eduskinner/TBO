name: "Build and Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: install frontend dependencies
        run: npm install

      - name: build tauri desktop
        run: npm run tauri build

      - name: upload macos dmg
        uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-macOS
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-android, i686-linux-android, x86_64-linux-android

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      - name: install frontend dependencies
        run: npm install

      - name: build tauri android
        run: npm run tauri android build -- --debug

      - name: upload android apk
        uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-Android
          path: src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
