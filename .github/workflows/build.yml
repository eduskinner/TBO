name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        architecture: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}
      - name: install frontend dependencies
        run: npm install
      - name: build tauri desktop
        run: npm run tauri build -- --target ${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}
        env:
          APPLE_SIGNING_IDENTITY: "-"
      - uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-macOS-${{ matrix.architecture }}
          path: src-tauri/target/${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}/release/bundle/dmg/*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: install android ndk
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
      - name: set ndk environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
      - name: install frontend dependencies
        run: npm install
      - name: initialize android project
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init --ci
          fi

      - name: install AndroidManifest with storage permissions
        run: |
          python3 -c '
          path = "src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          with open(path, "r") as f: content = f.read()
          perms = """
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
          """
          with open(path, "w") as f: f.write(content.replace("<application", perms + "\n    <application"))
          '

      - name: build android apk
        run: npm run tauri android build -- --apk --target aarch64 --debug
      - uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-Android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  create-release:
    needs: [build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Lector-TBO-macOS-aarch64
          path: release-artifacts
      - uses: actions/download-artifact@v4
        with:
          name: Lector-TBO-macOS-x86_64
          path: release-artifacts
      - uses: actions/download-artifact@v4
        with:
          name: Lector-TBO-Android
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Lector TBO - Latest Build
          body: |
            Automated build of Lector TBO.
            - macOS Apple Silicon: aarch64.dmg
            - macOS Intel: x86_64.dmg
            - Android arm64: debug.apk
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
