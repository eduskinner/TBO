name: "Build and Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        architecture: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}

      - name: install frontend dependencies
        run: npm install

      - name: build tauri desktop
        run: npm run tauri build -- --target ${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}

      - name: upload macos dmg
        uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-macOS-${{ matrix.architecture }}
          path: src-tauri/target/${{ matrix.architecture == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}/release/bundle/dmg/*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      # ── FIX 1: Install the NDK (required for Rust cross-compilation) ──────
      - name: install android ndk
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"

      # ── FIX 2: Set NDK environment variables so Tauri + Cargo can find it ─
      - name: set ndk environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: install frontend dependencies
        run: npm install

      # ── FIX 3: Only init if gen/android doesn't already exist in the repo ─
      - name: initialize android project
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "Android project not found — running tauri android init"
            npx tauri android init --ci
          else
            echo "Android project already initialised — skipping init"
          fi

      - name: build tauri android
        run: npm run tauri android build -- --debug

      - name: upload android apk
        uses: actions/upload-artifact@v4
        with:
          name: Lector-TBO-Android
          path: src-tauri/gen/android/app/build/outputs/apk/debug/*.apk

  create-release:
    needs: [build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download macos aarch64
        uses: actions/download-artifact@v4
        with:
          name: Lector-TBO-macOS-aarch64
          path: release-artifacts

      - name: download macos x86_64
        uses: actions/download-artifact@v4
        with:
          name: Lector-TBO-macOS-x86_64
          path: release-artifacts

      - name: download android apk
        uses: actions/download-artifact@v4
        with:
          name: Lector-TBO-Android
          path: release-artifacts

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Lector TBO - Latest Build"
          body: |
            Automated build of Lector TBO.
            - **macOS (Apple Silicon)**: aarch64.dmg
            - **macOS (Intel)**: x86_64.dmg
            - **Android**: debug.apk
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
