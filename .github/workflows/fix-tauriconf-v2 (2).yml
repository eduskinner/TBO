name: Fix tauri.conf.json

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: write tauri.conf.json
        run: echo '' | base64 --decode > src-tauri/tauri.conf.json

      - name: verify
        run: |
          grep -q "Lector TBO" src-tauri/tauri.conf.json || (echo FAIL && exit 1)
          grep -q "devUrl" src-tauri/tauri.conf.json || (echo FAIL && exit 1)
          grep -q "frontendDist" src-tauri/tauri.conf.json || (echo FAIL && exit 1)
          ! grep -q "devPath" src-tauri/tauri.conf.json || (echo FAIL && exit 1)
          echo OK

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git diff --cached --quiet && echo "nothing to commit" || git commit -m "fix: tauri.conf.json v2"
          git push
