name: Fix All — Android, PDF, Pan, Delete, Missing

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy src/App.tsx
        run: |
          mkdir -p src
          echo '' | base64 --decode > src/App.tsx

      - name: Deploy src/mobile/usePlatform.ts
        run: |
          mkdir -p src/mobile
          echo '' | base64 --decode > src/mobile/usePlatform.ts

      - name: Deploy src/components/Reader.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/Reader.tsx

      - name: Deploy src/types/index.ts
        run: |
          mkdir -p src/types
          echo '' | base64 --decode > src/types/index.ts

      - name: Deploy src/store/index.ts
        run: |
          mkdir -p src/store
          echo '' | base64 --decode > src/store/index.ts

      - name: Deploy src/components/ComicCard.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/ComicCard.tsx

      - name: Deploy src/components/FolderCard.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/FolderCard.tsx

      - name: Deploy src/components/Library.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/Library.tsx

      - name: Deploy src-tauri/src/lib.rs
        run: |
          mkdir -p src-tauri/src
          echo '' | base64 --decode > src-tauri/src/lib.rs

      - name: Deploy src-tauri/Cargo.toml
        run: |
          mkdir -p src-tauri
          echo '' | base64 --decode > src-tauri/Cargo.toml

      - name: verify
        run: |
          # Android routing
          grep -q "isAndroid" src/App.tsx || (echo "FAIL: mobile detection" && exit 1)
          grep -q "MobileApp" src/App.tsx || (echo "FAIL: MobileApp routing" && exit 1)
          grep -q "ANDROID_QUICK_PATHS" src/mobile/usePlatform.ts || (echo "FAIL: usePlatform" && exit 1)
          # Vertical pan
          grep -q 'overflow: "hidden"' src/components/Reader.tsx || (echo "FAIL: pan overflow" && exit 1)
          grep -q "Transform wrapper" src/components/Reader.tsx || (echo "FAIL: pan wrapper" && exit 1)
          # Delete / missing
          grep -q "missing: boolean" src/types/index.ts || (echo "FAIL: missing type" && exit 1)
          grep -q "deleteFolderComics" src/store/index.ts || (echo "FAIL: store deleteFolderComics" && exit 1)
          grep -q "clearMissingComics" src/store/index.ts || (echo "FAIL: store clearMissingComics" && exit 1)
          grep -q "Trash2" src/components/ComicCard.tsx || (echo "FAIL: ComicCard trash" && exit 1)
          grep -q "Trash2" src/components/FolderCard.tsx || (echo "FAIL: FolderCard trash" && exit 1)
          grep -q "missingTotal" src/components/Library.tsx || (echo "FAIL: Library missing banner" && exit 1)
          # Backend
          grep -q "journal_mode=WAL" src-tauri/src/lib.rs || (echo "FAIL: WAL mode" && exit 1)
          grep -q "cfg(desktop)" src-tauri/src/lib.rs || (echo "FAIL: set_focus guard" && exit 1)
          grep -q "unrar_crate_image_list" src-tauri/src/lib.rs || (echo "FAIL: unrar crate" && exit 1)
          grep -q "Candidate" src-tauri/src/lib.rs || (echo "FAIL: PDF largest image" && exit 1)
          grep -q "unrar" src-tauri/Cargo.toml || (echo "FAIL: unrar dep" && exit 1)
          echo "All checks passed ✓"

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "fix: Android routing, PDF page extraction, vertical pan, delete/missing UI"
          git push
