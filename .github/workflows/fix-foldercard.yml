name: Fix FolderCard

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: fix FolderCard.tsx
        run: echo '' | base64 --decode > src/components/FolderCard.tsx

      - name: verify
        run: |
          ! grep -q "import React," src/components/FolderCard.tsx || (echo "FAIL" && exit 1)
          echo "OK"

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/components/FolderCard.tsx
          git diff --cached --quiet || git commit -m "fix: remove unused React import from FolderCard"
          git push
