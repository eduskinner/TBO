name: Fix Delete Folder and PDF Reader

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: src-tauri/src/lib.rs
        run: |
          mkdir -p src-tauri/src
          echo '' | base64 --decode > src-tauri/src/lib.rs

      - name: src/store/index.ts
        run: |
          mkdir -p src/store
          echo '' | base64 --decode > src/store/index.ts

      - name: verify
        run: |
          grep -q "pdf_extract_page_bytes" src-tauri/src/lib.rs || (echo "FAIL: PDF function missing" && exit 1)
          grep -q "extract_any_image_from_page" src-tauri/src/lib.rs || (echo "FAIL: image extractor missing" && exit 1)
          ! grep -q 'Some("pdf") => fs::read' src-tauri/src/lib.rs || (echo "FAIL: old PDF arm still present" && exit 1)
          grep -q "loadLibrary" src/store/index.ts || (echo "FAIL: removeSource missing loadLibrary" && exit 1)
          echo "All checks passed"

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/src/lib.rs src/store/index.ts
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "fix: PDF page extraction per-page, delete folder reloads library"
          git push
