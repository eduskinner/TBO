name: Fix Library

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: fix Library.tsx
        run: echo '' | base64 --decode > src/components/Library.tsx

      - name: verify
        run: |
          ! grep -q "filteredComics" src/components/Library.tsx || (echo FAIL && exit 1)
          echo OK

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/components/Library.tsx
          git diff --cached --quiet && echo "nothing to commit" || git commit -m "fix: remove unused filteredComics from Library.tsx"
          git push
