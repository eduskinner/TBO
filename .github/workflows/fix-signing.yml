name: Fix Build and Signing

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: write updated build.yml
        run: echo '' | base64 --decode > .github/workflows/build.yml

      - name: write tauri.conf.json v2
        run: echo '' | base64 --decode > src-tauri/tauri.conf.json

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: ad-hoc macOS signing + tauri.conf.json v2 format"
          git push
