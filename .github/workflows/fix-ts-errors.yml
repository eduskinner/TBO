name: Fix TypeScript Errors

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: deploy src/components/ComicDetail.tsx
        run: echo '' | base64 --decode > src/components/ComicDetail.tsx

      - name: deploy src/components/ReaderWindow.tsx
        run: echo '' | base64 --decode > src/components/ReaderWindow.tsx

      - name: deploy src/components/FolderCard.tsx
        run: echo '' | base64 --decode > src/components/FolderCard.tsx

      - name: deploy src/components/Settings.tsx
        run: echo '' | base64 --decode > src/components/Settings.tsx

      - name: verify
        run: |
          ! grep -q "toggleRead" src/components/ComicDetail.tsx         || (echo "FAIL: toggleRead in ComicDetail" && exit 1)
          ! grep -q "import React," src/components/ReaderWindow.tsx     || (echo "FAIL: unused React in ReaderWindow" && exit 1)
          ! grep -q "deleteFolder" src/components/FolderCard.tsx        || (echo "FAIL: deleteFolder in FolderCard" && exit 1)
          ! grep -q "clearMissingComics" src/components/Settings.tsx    || (echo "FAIL: clearMissingComics in Settings" && exit 1)
          echo "All checks passed"

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/components/ComicDetail.tsx src/components/ReaderWindow.tsx src/components/FolderCard.tsx src/components/Settings.tsx
          git diff --cached --quiet || git commit -m "fix: TypeScript unused var and missing store method errors"
          git push
