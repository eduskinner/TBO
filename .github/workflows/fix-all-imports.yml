name: Fix All Imports and Reader Window

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: deploy src/App.tsx
        run: |
          mkdir -p src
          echo '' | base64 --decode > src/App.tsx

      - name: deploy src/components/Reader.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/Reader.tsx

      - name: deploy src/components/ReaderWindow.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/ReaderWindow.tsx

      - name: deploy src/components/ComicDetail.tsx
        run: |
          mkdir -p src/components
          echo '' | base64 --decode > src/components/ComicDetail.tsx

      - name: deploy src/mobile/MobileApp.tsx
        run: |
          mkdir -p src/mobile
          echo '' | base64 --decode > src/mobile/MobileApp.tsx

      - name: deploy src/store/index.ts
        run: |
          mkdir -p src/store
          echo '' | base64 --decode > src/store/index.ts

      - name: deploy src/store/coverQueue.ts
        run: |
          mkdir -p src/store
          echo '' | base64 --decode > src/store/coverQueue.ts

      - name: deploy src/store/pageQueue.ts
        run: |
          mkdir -p src/store
          echo '' | base64 --decode > src/store/pageQueue.ts

      - name: deploy src-tauri/src/lib.rs
        run: |
          mkdir -p src-tauri/src
          echo '' | base64 --decode > src-tauri/src/lib.rs

      - name: verify all changes
        run: |
          ! grep -q "@tauri-apps/api/tauri" src/App.tsx || (echo "FAIL: old import in src/App.tsx" && exit 1)
          ! grep -q "@tauri-apps/api/tauri" src/components/Reader.tsx || (echo "FAIL: old import in src/components/Reader.tsx" && exit 1)
          ! grep -q "@tauri-apps/api/tauri" src/components/ReaderWindow.tsx || (echo "FAIL: old import in src/components/ReaderWindow.tsx" && exit 1)
          ! grep -q "@tauri-apps/api/tauri" src/components/ComicDetail.tsx || (echo "FAIL: old import in src/components/ComicDetail.tsx" && exit 1)
          ! grep -q "@tauri-apps/api/tauri" src/mobile/MobileApp.tsx || (echo "FAIL: old import in src/mobile/MobileApp.tsx" && exit 1)
          ! grep -q "@tauri-apps/api/tauri" src/store/index.ts || (echo "FAIL: old import in src/store/index.ts" && exit 1)
          ! grep -q "@tauri-apps/api/tauri" src/store/coverQueue.ts || (echo "FAIL: old import in src/store/coverQueue.ts" && exit 1)
          ! grep -q "@tauri-apps/api/tauri" src/store/pageQueue.ts || (echo "FAIL: old import in src/store/pageQueue.ts" && exit 1)
          grep -q "index.html#reader" src-tauri/src/lib.rs || (echo "FAIL: #reader missing" && exit 1)
          grep -q "__TAURI_INTERNALS__" src/App.tsx || (echo "FAIL: v2 metadata missing" && exit 1)
          echo "All checks passed"

      - name: remove stale shims file
        run: rm -f src/tauri-shims.d.ts

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: all Tauri v2 imports + reader window hash"
          git push
