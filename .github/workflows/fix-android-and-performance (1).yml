name: Fix CBR Compatibility and Android Build

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: src-tauri/src/lib.rs
        run: |
          mkdir -p src-tauri/src
          echo '' | base64 --decode > src-tauri/src/lib.rs

      - name: src-tauri/Cargo.toml
        run: |
          mkdir -p src-tauri
          echo '' | base64 --decode > src-tauri/Cargo.toml

      - name: verify
        run: |
          grep -q "cfg(desktop)" src-tauri/src/lib.rs || (echo "FAIL: set_focus guard" && exit 1)
          grep -q "journal_mode=WAL" src-tauri/src/lib.rs || (echo "FAIL: WAL mode" && exit 1)
          grep -q "idx_comics_series" src-tauri/src/lib.rs || (echo "FAIL: DB indexes" && exit 1)
          grep -q "is_zip_magic" src-tauri/src/lib.rs || (echo "FAIL: ZIP magic" && exit 1)
          grep -q "is_rar_magic" src-tauri/src/lib.rs || (echo "FAIL: RAR magic" && exit 1)
          grep -q "unrar_crate_image_list" src-tauri/src/lib.rs || (echo "FAIL: unrar crate" && exit 1)
          grep -q "unrar" src-tauri/Cargo.toml || (echo "FAIL: unrar dep" && exit 1)
          ! grep -q "journal_mode=DELETE" src-tauri/src/lib.rs || (echo "FAIL: old journal mode" && exit 1)
          echo "All checks passed"

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/src/lib.rs src-tauri/Cargo.toml
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "fix: CBR RAR4/RAR5 support (unrar crate), Android build, WAL mode, DB indexes"
          git push
