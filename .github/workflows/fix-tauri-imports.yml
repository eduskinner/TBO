name: Fix tauri api imports

on:
  workflow_dispatch:

jobs:
  fix-imports:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: restore original tsconfig.json
        run: echo '' | base64 --decode > tsconfig.json

      - name: fix @tauri-apps/api subpath imports in App.tsx
        run: |
          sed -i 's|from "@tauri-apps/api/tauri"|from "@tauri-apps/api"|g' src/App.tsx

      - name: fix @tauri-apps/api subpath imports in MobileApp.tsx
        run: |
          sed -i 's|from "@tauri-apps/api/tauri"|from "@tauri-apps/api"|g' src/mobile/MobileApp.tsx
          sed -i 's|from "@tauri-apps/api/event"|from "@tauri-apps/api"|g' src/mobile/MobileApp.tsx

      - name: commit
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add tsconfig.json src/App.tsx src/mobile/MobileApp.tsx
          git diff --cached --quiet || git commit -m 'fix: use @tauri-apps/api root imports, restore tsconfig'
          git push
