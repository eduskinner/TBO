name: Deploy AndroidManifest with Storage Permissions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write src-tauri/AndroidManifest.xml
        run: |
          echo '' | base64 --decode > src-tauri/AndroidManifest.xml

      - name: verify
        run: |
          grep -q "MANAGE_EXTERNAL_STORAGE" src-tauri/AndroidManifest.xml || (echo "FAIL" && exit 1)
          grep -q "READ_EXTERNAL_STORAGE"   src-tauri/AndroidManifest.xml || (echo "FAIL" && exit 1)
          grep -q "requestLegacyExternalStorage" src-tauri/AndroidManifest.xml || (echo "FAIL" && exit 1)
          echo "Manifest OK:"
          cat src-tauri/AndroidManifest.xml

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/AndroidManifest.xml
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "fix: add AndroidManifest.xml with storage permissions for Android file scanning"
          git push
