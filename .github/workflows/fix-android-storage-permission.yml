name: Fix Android Storage Permission UI

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy src/mobile/MobileApp.tsx
        run: |
          mkdir -p src/mobile
          echo '' | base64 --decode > src/mobile/MobileApp.tsx

      - name: verify
        run: |
          grep -q "permissionDenied" src/mobile/MobileApp.tsx || (echo "FAIL: permission detection missing" && exit 1)
          grep -q "permWarn" src/mobile/MobileApp.tsx || (echo "FAIL: permission warning state missing" && exit 1)
          grep -q "Storage permission required" src/mobile/MobileApp.tsx || (echo "FAIL: warning banner missing" && exit 1)
          echo "All checks passed"

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/mobile/MobileApp.tsx
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "fix: Android storage permission detection and guidance UI"
          git push
