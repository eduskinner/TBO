name: Fix Reader Window

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: write fixed lib.rs
        run: echo '' | base64 --decode > src-tauri/src/lib.rs

      - name: write fixed App.tsx
        run: echo '' | base64 --decode > src/App.tsx

      - name: verify
        run: |
          grep 'index.html#reader' src-tauri/src/lib.rs   || (echo "FAIL: hash missing in lib.rs" && exit 1)
          grep '@tauri-apps/api/core' src/App.tsx          || (echo "FAIL: wrong import in App.tsx" && exit 1)
          grep '__TAURI_INTERNALS__' src/App.tsx           || (echo "FAIL: v2 metadata missing in App.tsx" && exit 1)
          ! grep '@tauri-apps/api/tauri' src/App.tsx       || (echo "FAIL: old import still present" && exit 1)
          echo "All checks passed"

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/src/lib.rs src/App.tsx
          git diff --cached --quiet || git commit -m "fix: reader window opens correctly"
          git push
