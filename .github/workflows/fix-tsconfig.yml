name: Fix tsconfig moduleResolution

on:
  workflow_dispatch:

jobs:
  fix-tsconfig:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: write tsconfig.json
        run: |
          echo '' | base64 --decode > tsconfig.json

      - name: commit
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add tsconfig.json
          git diff --cached --quiet || git commit -m 'fix: moduleResolution node for @tauri-apps/api v1 compatibility'
          git push