name: Fix Android - Capabilities and Manifest

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write capabilities/default.json
        run: |
          mkdir -p src-tauri/capabilities
          echo '' | base64 --decode > src-tauri/capabilities/default.json

      - name: Write corrected AndroidManifest.xml (fixes permistion typo)
        run: |
          mkdir -p src-tauri/gen/android/app/src/main
          echo '' | base64 --decode > src-tauri/AndroidManifest.xml

      - name: Verify both files
        run: |
          echo "=== capabilities/default.json ==="
          cat src-tauri/capabilities/default.json
          grep -q "core:default" src-tauri/capabilities/default.json || (echo "FAIL: core:default missing" && exit 1)
          grep -qv "allow-read-recursive" src-tauri/capabilities/default.json || (echo "FAIL: bad permission still present" && exit 1)

          echo "=== AndroidManifest.xml ==="
          cat src-tauri/AndroidManifest.xml
          grep -q "android.permission.READ_EXTERNAL_STORAGE" src-tauri/AndroidManifest.xml || (echo "FAIL: READ permission missing" && exit 1)
          grep -q "MANAGE_EXTERNAL_STORAGE" src-tauri/AndroidManifest.xml || (echo "FAIL: MANAGE permission missing" && exit 1)
          grep -qv "permistion" src-tauri/AndroidManifest.xml || (echo "FAIL: typo still present" && exit 1)
          echo "All checks passed"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/capabilities/default.json src-tauri/AndroidManifest.xml
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "fix: add capabilities (core:default) and correct manifest permission typo"
          git push
